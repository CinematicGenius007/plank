<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="g">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="#0C0E18"/>

  <!-- Subtle UV grid lines -->
  <line x1="0" y1="16" x2="64" y2="16" stroke="#FFFFFF" stroke-width="0.5" opacity="0.05"/>
  <line x1="0" y1="48" x2="64" y2="48" stroke="#FFFFFF" stroke-width="0.5" opacity="0.05"/>
  <line x1="16" y1="0" x2="16" y2="64" stroke="#FFFFFF" stroke-width="0.5" opacity="0.05"/>
  <line x1="48" y1="0" x2="48" y2="64" stroke="#FFFFFF" stroke-width="0.5" opacity="0.05"/>

  <!-- 4×3 pixel grid, cell=10px, gap=3px, stride=13px, origin=(8,12) -->

  <!-- row 1 — v1, dim (4 cells) -->
  <rect x="8"  y="12" width="10" height="10" rx="2.5" fill="#FF6B35" opacity="0.18" filter="url(#g)"/>
  <rect x="21" y="12" width="10" height="10" rx="2.5" fill="#FF6B35" opacity="0.18" filter="url(#g)"/>
  <rect x="34" y="12" width="10" height="10" rx="2.5" fill="#FF6B35" opacity="0.18" filter="url(#g)"/>
  <rect x="47" y="12" width="10" height="10" rx="2.5" fill="#FF6B35" opacity="0.18" filter="url(#g)"/>

  <!-- row 2 — v2, medium (4 cells) -->
  <rect x="8"  y="27" width="10" height="10" rx="2.5" fill="#FF6B35" opacity="0.5" filter="url(#g)"/>
  <rect x="21" y="27" width="10" height="10" rx="2.5" fill="#FF6B35" opacity="0.5" filter="url(#g)"/>
  <rect x="34" y="27" width="10" height="10" rx="2.5" fill="#FF6B35" opacity="0.5" filter="url(#g)"/>
  <rect x="47" y="27" width="10" height="10" rx="2.5" fill="#FF6B35" opacity="0.5" filter="url(#g)"/>

  <!-- row 3 — v3 latest, full bright (4 cells) -->
  <rect x="8"  y="42" width="10" height="10" rx="2.5" fill="#FF6B35" filter="url(#g)"/>
  <rect x="21" y="42" width="10" height="10" rx="2.5" fill="#FF6B35" filter="url(#g)"/>
  <rect x="34" y="42" width="10" height="10" rx="2.5" fill="#FF6B35" filter="url(#g)"/>
  <rect x="47" y="42" width="10" height="10" rx="2.5" fill="#FF6B35" filter="url(#g)"/>
</svg>
